<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Contrato Inteligente</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      font-size: 20px;
    }
    body { -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body class="bg-gray-50 md:bg-gray-100 font-sans selection:bg-blue-200">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- CONFIGURAÇÃO DO BACKEND ---
    const BACKEND_URL = 'https://contrato-inteligente.grupo-bhds.workers.dev'; 

    // --- COMPONENTES DE UI ---
    const Icon = ({ name, className = '' }) => (
      <span className={`material-symbols-outlined ${className}`}>{name}</span>
    );

    const Card = ({ children, className = '' }) => (
      <div className={`bg-white rounded-[24px] md:rounded-[28px] shadow-sm border border-gray-100 p-4 md:p-6 ${className}`}>
        {children}
      </div>
    );

    const Button = ({ children, onClick, variant = 'primary', iconName, loading = false, className = '' }) => {
      const baseStyle = "flex items-center justify-center gap-2 px-4 py-2.5 md:px-6 md:py-3 rounded-full text-sm md:text-base font-medium transition-all duration-200 active:scale-[0.98]";
      const variants = {
        primary: "bg-blue-600 text-white hover:bg-blue-700 shadow-md hover:shadow-lg",
        secondary: "bg-blue-50 text-blue-700 hover:bg-blue-100",
        tonal: "bg-gray-100 text-gray-800 hover:bg-gray-200",
        danger: "bg-red-50 text-red-600 hover:bg-red-100",
        success: "bg-green-600 text-white hover:bg-green-700 shadow-md"
      };

      return (
        <button onClick={onClick} disabled={loading} className={`${baseStyle} ${variants[variant]} ${loading ? 'opacity-70 cursor-not-allowed' : ''} ${className}`}>
          {loading ? <Icon name="sync" className="animate-spin" /> : iconName && <Icon name={iconName} />}
          {children}
        </button>
      );
    };

    const Input = ({ label, value, onChange, placeholder, type = "text", iconName }) => (
      <div className="flex flex-col gap-1 w-full">
        <label className="text-xs md:text-sm font-medium text-gray-700 ml-1">{label}</label>
        <div className="relative">
          {iconName && <Icon name={iconName} className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" />}
          <input
            type={type}
            value={value}
            onChange={onChange}
            placeholder={placeholder}
            className={`w-full bg-gray-50 border border-gray-200 text-gray-900 text-sm md:text-base rounded-xl md:rounded-2xl px-3 py-2.5 md:px-4 md:py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-colors ${iconName ? 'pl-10 md:pl-11' : ''}`}
          />
        </div>
      </div>
    );

    // --- PÁGINA: NOVO PEDIDO ---
    const NovoPedido = ({ appPassword }) => {
      const defaultState = {
        nome: '', cpf: '', tipoObjeto: 'produto', objeto: '',
        valor: '', vencimento: '', emails: [''], telefones: [''], enderecos: ['']
      };

      const [formData, setFormData] = useState(defaultState);
      const [contractFileBase64, setContractFileBase64] = useState(null);
      const [contractFileName, setContractFileName] = useState('');
      
      const [loadingAction, setLoadingAction] = useState(null);
      const [showClearModal, setShowClearModal] = useState(false);
      const [systemMessage, setSystemMessage] = useState(null);
      
      const [generatedContract, setGeneratedContract] = useState(null);
      const [paymentLink, setPaymentLink] = useState(null);
      const [signatureLink, setSignatureLink] = useState(null);

      useEffect(() => {
        const saved = localStorage.getItem('novoPedidoData');
        if (saved) { try { setFormData(JSON.parse(saved)); } catch (e) { console.error(e); } }
      }, []);

      useEffect(() => {
        localStorage.setItem('novoPedidoData', JSON.stringify(formData));
      }, [formData]);

      const handleDynamicChange = (field, index, value) => {
        const newData = { ...formData };
        newData[field][index] = value;
        setFormData(newData);
      };

      const addField = (field) => setFormData({ ...formData, [field]: [...formData[field], ''] });
      
      const removeField = (field, index) => {
        if (formData[field].length > 1) {
          const newData = { ...formData };
          newData[field].splice(index, 1);
          setFormData(newData);
        }
      };

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          setContractFileName(file.name);
          const reader = new FileReader();
          reader.onloadend = () => setContractFileBase64(reader.result.replace('data:', '').replace(/^.+,/, ''));
          reader.readAsDataURL(file);
        }
      };

      const handleLimpar = () => {
        setFormData(defaultState);
        setContractFileBase64(null); setContractFileName('');
        setGeneratedContract(null); setPaymentLink(null); setSignatureLink(null);
        localStorage.removeItem('novoPedidoData');
        setShowClearModal(false);
        setSystemMessage({ type: 'success', text: 'Formulário limpo com sucesso.' });
        setTimeout(() => setSystemMessage(null), 3000);
      };

      const handleAtualizar = async () => {
        if (!appPassword) return alert("Por favor, digite a Senha do Sistema no topo da tela.");
        if (!contractFileBase64) return alert("Por favor, anexe o contrato base (.docx) primeiro.");
        
        setLoadingAction('atualizar'); setSystemMessage(null);
        
        try {
          const response = await fetch(`${BACKEND_URL}/api/generate-contract`, {
            method: 'POST',
            headers: { 
              'Content-Type': 'application/json',
              'X-App-Password': appPassword // Senha enviada no cabeçalho
            },
            body: JSON.stringify({
              dadosCliente: formData,
              contratoBase64: contractFileBase64
            })
          });

          const data = await response.json();
          if (response.status === 401) throw new Error("Acesso Negado: Senha Incorreta.");
          if (!response.ok) throw new Error(data.error || 'Erro ao gerar contrato');

          setGeneratedContract(data.contratoAtualizado);
          setSystemMessage({ type: 'success', text: 'Contrato atualizado com sucesso pela IA! Pronto para visualizar/enviar.' });
        } catch (error) {
          setSystemMessage({ type: 'error', text: `Falha: ${error.message}` });
        } finally {
          setLoadingAction(null);
          setTimeout(() => setSystemMessage(null), 5000);
        }
      };

      const handleVisualizar = () => {
        if (!generatedContract) return alert("Você precisa 'Atualizar (Gemini)' o contrato primeiro.");
        const newWindow = window.open('', '_blank');
        newWindow.document.write(`<pre style="font-family: sans-serif; padding: 20px; white-space: pre-wrap;">${generatedContract}</pre>`);
        newWindow.document.close();
      };

      const handleEnviar = async () => {
        if (!appPassword) return alert("Por favor, digite a Senha do Sistema no topo da tela.");
        if (!generatedContract) return alert("Gere o contrato com o Gemini primeiro clicando em 'Atualizar'.");
        
        setLoadingAction('enviar'); setSystemMessage(null);
        
        try {
          const response = await fetch(`${BACKEND_URL}/api/process-order`, {
            method: 'POST',
            headers: { 
              'Content-Type': 'application/json',
              'X-App-Password': appPassword // Senha enviada no cabeçalho
            },
            body: JSON.stringify({
              dadosCliente: formData,
              contratoTexto: generatedContract
            })
          });

          const data = await response.json();
          if (response.status === 401) throw new Error("Acesso Negado: Senha Incorreta.");
          if (!response.ok) throw new Error(data.error || 'Erro ao processar pedido');

          setPaymentLink(data.asaas?.paymentLink || "Link simulado de pagamento");
          setSignatureLink(data.assinafy?.signatureLink || "Link simulado de assinatura");
          
          setSystemMessage({ type: 'success', text: 'Sucesso! Cliente cadastrado e contrato enviado para assinatura.' });
        } catch (error) {
          setSystemMessage({ type: 'error', text: `Falha: ${error.message}` });
        } finally {
          setLoadingAction(null);
        }
      };

      return (
        <div className="max-w-4xl mx-auto pb-32">
          {systemMessage && (
            <div className={`mb-6 p-4 rounded-2xl flex items-center gap-3 ${systemMessage.type === 'success' ? 'bg-green-50 text-green-800' : 'bg-red-50 text-red-800'}`}>
              <Icon name={systemMessage.type === 'success' ? 'check_circle' : 'error'} className="text-2xl" />
              <span className="font-medium text-sm md:text-base">{systemMessage.text}</span>
            </div>
          )}

          {(paymentLink || signatureLink) && (
            <Card className="mb-6 border-green-200 bg-green-50/30">
               <h2 className="text-lg md:text-xl font-bold text-gray-800 mb-4 flex items-center gap-2"><Icon name="check_circle" className="text-green-600"/> Links Gerados</h2>
               <div className="flex flex-col gap-3">
                 {paymentLink && (
                   <div className="bg-white p-3 rounded-xl border border-gray-200 flex justify-between items-center">
                     <span className="font-medium text-gray-700 text-sm">Pagamento (Asaas)</span>
                     <a href={paymentLink} target="_blank" rel="noreferrer" className="text-blue-600 hover:underline text-sm font-bold">Abrir</a>
                   </div>
                 )}
                 {signatureLink && (
                   <div className="bg-white p-3 rounded-xl border border-gray-200 flex justify-between items-center">
                     <span className="font-medium text-gray-700 text-sm">Assinatura (Assinafy)</span>
                     <a href={signatureLink} target="_blank" rel="noreferrer" className="text-blue-600 hover:underline text-sm font-bold">Abrir</a>
                   </div>
                 )}
               </div>
            </Card>
          )}

          <Card className="mb-6">
            <h2 className="text-xl md:text-2xl font-bold text-gray-800 mb-6">Dados Principais</h2>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
              <Input label="Nome Completo" value={formData.nome} onChange={(e) => setFormData({...formData, nome: e.target.value})} placeholder="João da Silva" />
              <Input label="CPF" value={formData.cpf} onChange={(e) => setFormData({...formData, cpf: e.target.value})} placeholder="000.000.000-00" />
              
              <div className="flex flex-col gap-1 w-full">
                <label className="text-xs md:text-sm font-medium text-gray-700 ml-1">Tipo do Contrato</label>
                <div className="flex bg-gray-100 p-1 rounded-xl md:rounded-2xl w-full h-11 md:h-12">
                  <button type="button" className={`flex-1 py-1 text-sm font-medium rounded-xl transition-all ${formData.tipoObjeto === 'produto' ? 'bg-white text-blue-700 shadow-sm' : 'text-gray-500 hover:text-gray-900'}`} onClick={() => setFormData({...formData, tipoObjeto: 'produto'})}>Produto Físico</button>
                  <button type="button" className={`flex-1 py-1 text-sm font-medium rounded-xl transition-all ${formData.tipoObjeto === 'servico' ? 'bg-white text-blue-700 shadow-sm' : 'text-gray-500 hover:text-gray-900'}`} onClick={() => setFormData({...formData, tipoObjeto: 'servico'})}>Prestação de Serviço</button>
                </div>
              </div>

              <Input label={formData.tipoObjeto === 'produto' ? "Descrição do Produto" : "Descrição do Serviço"} value={formData.objeto} onChange={(e) => setFormData({...formData, objeto: e.target.value})} placeholder={formData.tipoObjeto === 'produto' ? "Ex: 01 Perfume Boticário Malbec 100ml" : "Ex: Formatação de Notebook Dell com Backup"} />

              <div className="grid grid-cols-2 gap-3 md:gap-4">
                <Input label="Valor Total (R$)" value={formData.valor} onChange={(e) => setFormData({...formData, valor: e.target.value})} placeholder="150,00" />
                <Input label="Vencimento" type="date" value={formData.vencimento} onChange={(e) => setFormData({...formData, vencimento: e.target.value})} />
              </div>
            </div>
          </Card>

          <Card className="mb-6">
            <h2 className="text-xl md:text-2xl font-bold text-gray-800 mb-6">Contatos e Endereço</h2>
            
            <div className="mb-6">
              <label className="text-sm font-medium text-gray-700 ml-1 mb-2 block">Telefone / WhatsApp</label>
              {formData.telefones.map((tel, index) => (
                <div key={index} className="flex gap-2 mb-2">
                  <Input iconName="phone" value={tel} onChange={(e) => handleDynamicChange('telefones', index, e.target.value)} placeholder="(00) 00000-0000" />
                  {index > 0 && <Button variant="danger" iconName="delete" onClick={() => removeField('telefones', index)} className="px-3 md:px-4" />}
                </div>
              ))}
              <button onClick={() => addField('telefones')} className="text-blue-600 text-sm font-medium flex items-center gap-1 mt-1 hover:underline"><Icon name="add" className="!text-[18px]"/> Adicionar outro número</button>
            </div>

            <div className="mb-6">
              <label className="text-sm font-medium text-gray-700 ml-1 mb-2 block">E-mails</label>
              {formData.emails.map((email, index) => (
                <div key={index} className="flex gap-2 mb-2">
                  <Input iconName="mail" value={email} onChange={(e) => handleDynamicChange('emails', index, e.target.value)} placeholder="cliente@email.com" />
                  {index > 0 && <Button variant="danger" iconName="delete" onClick={() => removeField('emails', index)} className="px-3 md:px-4" />}
                </div>
              ))}
              <button onClick={() => addField('emails')} className="text-blue-600 text-sm font-medium flex items-center gap-1 mt-1 hover:underline"><Icon name="add" className="!text-[18px]"/> Adicionar outro e-mail</button>
            </div>

            <div>
              <label className="text-sm font-medium text-gray-700 ml-1 mb-2 block">Endereços Físicos (Para Citação JEC)</label>
              {formData.enderecos.map((end, index) => (
                <div key={index} className="flex gap-2 mb-2">
                  <Input iconName="location_on" value={end} onChange={(e) => handleDynamicChange('enderecos', index, e.target.value)} placeholder="Rua, Número, Bairro, CEP, Cidade" />
                  {index > 0 && <Button variant="danger" iconName="delete" onClick={() => removeField('enderecos', index)} className="px-3 md:px-4" />}
                </div>
              ))}
              <button onClick={() => addField('enderecos')} className="text-blue-600 text-sm font-medium flex items-center gap-1 mt-1 hover:underline"><Icon name="add" className="!text-[18px]"/> Adicionar outro endereço</button>
            </div>
          </Card>

          <Card className="mb-8">
            <h2 className="text-xl md:text-2xl font-bold text-gray-800 mb-4">Contrato Base (.docx)</h2>
            <div className="border-2 border-dashed border-gray-300 rounded-2xl p-6 md:p-8 flex flex-col items-center justify-center text-center bg-gray-50 hover:bg-gray-100 transition-colors cursor-pointer relative">
              <input type="file" accept=".docx" onChange={handleFileUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
              {contractFileBase64 ? <Icon name="history_edu" className="!text-[48px] text-green-500 mb-3" /> : <Icon name="cloud_upload" className="!text-[48px] text-blue-500 mb-3" />}
              <span className="font-medium text-gray-700">{contractFileBase64 ? contractFileName : "Clique ou arraste o contrato base aqui"}</span>
              <span className="text-sm text-gray-500 mt-1">Apenas arquivos .docx</span>
            </div>
          </Card>

          <div className="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-gray-200 p-3 md:p-4 shadow-[0_-4px_20px_rgba(0,0,0,0.05)] z-40">
            <div className="max-w-4xl mx-auto flex flex-col md:flex-row gap-2 md:gap-3 justify-between items-center">
              <div className="flex w-full md:w-auto gap-2 md:gap-3">
                <Button variant="danger" iconName="ink_eraser" onClick={() => setShowClearModal(true)} className="flex-1 md:flex-none text-xs md:text-base">Limpar</Button>
                <Button variant="tonal" iconName="visibility" onClick={handleVisualizar} className="flex-1 md:flex-none text-xs md:text-base">Visualizar</Button>
              </div>
              <div className="flex w-full md:w-auto gap-2 md:gap-3">
                <Button variant="secondary" iconName="sync" loading={loadingAction === 'atualizar'} onClick={handleAtualizar} className="flex-1 md:flex-none text-xs md:text-base">
                  <span className="hidden sm:inline">Atualizar (Gemini)</span><span className="sm:hidden">Atualizar</span>
                </Button>
                <Button variant={generatedContract ? "success" : "primary"} iconName="send" loading={loadingAction === 'enviar'} onClick={handleEnviar} className="flex-1 md:flex-none text-xs md:text-base">
                  <span className="hidden sm:inline">Enviar (Asaas)</span><span className="sm:hidden">Enviar</span>
                </Button>
              </div>
            </div>
          </div>

          {showClearModal && (
            <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-[28px] p-6 md:p-8 max-w-sm w-full shadow-2xl">
                <div className="w-12 h-12 bg-red-100 text-red-600 rounded-full flex items-center justify-center mb-4"><Icon name="error" /></div>
                <h3 className="text-xl font-bold text-gray-900 mb-2">Limpar tudo?</h3>
                <p className="text-gray-600 text-sm md:text-base mb-6">Isso apagará todos os dados preenchidos. Essa ação não pode ser desfeita.</p>
                <div className="flex gap-3 justify-end">
                  <Button variant="tonal" onClick={() => setShowClearModal(false)}>Cancelar</Button>
                  <Button variant="danger" onClick={handleLimpar}>Sim, limpar</Button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    // --- PÁGINA: BUSCAR PEDIDO ---
    const BuscarPedido = ({ appPassword }) => {
      const [searchQuery, setSearchQuery] = useState('');
      const [loading, setLoading] = useState(false);
      const [result, setResult] = useState(null);

      const handleSearch = async () => {
        if(!searchQuery) return;
        if(!appPassword) return alert("Por favor, digite a Senha do Sistema no topo da tela.");
        
        setLoading(true);
        try {
          const response = await fetch(`${BACKEND_URL}/api/search?q=${searchQuery}`, {
            headers: { 'X-App-Password': appPassword }
          });
          
          const data = await response.json();
          if (response.status === 401) throw new Error("Acesso Negado: Senha Incorreta.");
          if (!response.ok) throw new Error(data.error || "Erro na busca");
          
          setResult(data);
        } catch(e) {
          alert(e.message);
        } finally {
          setLoading(false);
        }
      };

      const handleFileUpload = (type, file) => {
        if(!file) return;
        alert(`Arquivo selecionado para ${type}: ${file.name}. \n\nAqui o backend enviaria para o Google Drive.`);
      };

      return (
        <div className="max-w-4xl mx-auto pb-24">
          <Card className="mb-6 bg-blue-600 text-white border-none">
            <h2 className="text-xl md:text-2xl font-bold mb-4">Buscar Cliente / Pedido</h2>
            <div className="flex flex-col sm:flex-row gap-3">
              <div className="relative flex-1">
                <Icon name="search" className="absolute left-4 top-1/2 -translate-y-1/2 text-blue-300" />
                <input
                  type="text" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)}
                  placeholder="Nome, CPF ou ID..."
                  className="w-full bg-blue-700/50 border border-blue-500 text-white placeholder-blue-300 rounded-xl md:rounded-full px-4 py-3 pl-12 focus:outline-none focus:ring-2 focus:ring-white transition-colors"
                />
              </div>
              <Button variant="tonal" className="!bg-white !text-blue-600" loading={loading} onClick={handleSearch}>Buscar</Button>
            </div>
          </Card>

          {result && (
            <Card className="animate-in slide-in-from-bottom-4 duration-300">
              <div className="flex flex-col md:flex-row justify-between items-start mb-6 border-b border-gray-100 pb-4 gap-4">
                <div>
                  <h3 className="text-xl md:text-2xl font-bold text-gray-800">{result.nome}</h3>
                  <p className="text-gray-500 text-sm md:text-base">CPF: {result.cpf}</p>
                </div>
                <div className="text-left md:text-right">
                  <span className="inline-block px-3 py-1 bg-green-100 text-green-700 rounded-full text-xs md:text-sm font-medium mb-1">Contrato {result.statusContrato}</span>
                  <p className="text-xs md:text-sm font-medium text-amber-600">Pagamento: {result.statusPagamento}</p>
                </div>
              </div>
              
              <div className="mb-8">
                <p className="font-medium text-gray-700 mb-1 text-sm md:text-base">Objeto do Contrato:</p>
                <p className="text-gray-600 bg-gray-50 p-3 rounded-xl text-sm md:text-base">{result.objeto}</p>
              </div>

              <h4 className="font-bold text-gray-800 mb-4 text-base md:text-lg">Provas para o JEC (Google Drive)</h4>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div className="border border-gray-200 rounded-2xl p-5 flex flex-col items-center justify-center text-center hover:bg-gray-50 transition-colors">
                  <Icon name="description" className="!text-[40px] text-gray-400 mb-3" />
                  <p className="font-medium text-gray-800 mb-2 text-sm md:text-base">Comprovante Assinado</p>
                  <div className="relative w-full max-w-[200px]">
                    <Button variant="secondary" iconName="cloud_upload" className="w-full text-xs md:text-sm px-4 py-2">Escolher Arquivo</Button>
                    <input type="file" accept="image/*,application/pdf" onChange={(e) => handleFileUpload('comprovante', e.target.files[0])} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                  </div>
                </div>

                <div className="border border-gray-200 rounded-2xl p-5 flex flex-col items-center justify-center text-center hover:bg-gray-50 transition-colors">
                  <Icon name="photo_camera" className="!text-[40px] text-gray-400 mb-3" />
                  <p className="font-medium text-gray-800 mb-2 text-sm md:text-base">Foto da Entrega</p>
                  <div className="relative w-full max-w-[200px]">
                    <Button variant="primary" iconName="photo_camera" className="w-full text-xs md:text-sm px-4 py-2">Tirar Foto Agora</Button>
                    <input type="file" accept="image/*" capture="environment" onChange={(e) => handleFileUpload('foto_cliente', e.target.files[0])} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                  </div>
                </div>
              </div>
            </Card>
          )}
        </div>
      );
    };

    // --- ROTEADOR PRINCIPAL ---
    const App = () => {
      const [currentRoute, setCurrentRoute] = useState(window.location.hash || '#novo-pedido');
      // Estado para a Senha do Sistema (Salva localmente)
      const [appPassword, setAppPassword] = useState(localStorage.getItem('appPassword') || '');

      useEffect(() => {
        const handleHashChange = () => setCurrentRoute(window.location.hash || '#novo-pedido');
        window.addEventListener('hashchange', handleHashChange);
        return () => window.removeEventListener('hashchange', handleHashChange);
      }, []);

      useEffect(() => {
        localStorage.setItem('appPassword', appPassword);
      }, [appPassword]);

      const navigateTo = (hash) => window.location.hash = hash;

      return (
        <div className="min-h-screen bg-gray-50 md:bg-gray-100 flex flex-col">
          
          {/* Barra de Senha Global (Segurança) */}
          <div className="bg-slate-900 text-white px-4 py-2.5 flex items-center justify-center gap-2 md:gap-3 z-50 shadow-md">
            <Icon name="lock" className="!text-[18px] text-amber-400" />
            <span className="text-xs md:text-sm font-medium">Senha do Sistema:</span>
            <input
              type="password"
              value={appPassword}
              onChange={(e) => setAppPassword(e.target.value)}
              placeholder="••••••••"
              className="bg-slate-800 border border-slate-700 text-white px-3 py-1.5 rounded-lg text-xs md:text-sm outline-none focus:border-amber-400 focus:ring-1 focus:ring-amber-400 w-32 md:w-48 transition-all"
            />
          </div>

          <header className="bg-white px-4 py-3 md:px-6 md:py-4 flex flex-col md:flex-row items-center justify-between sticky top-0 z-30 shadow-sm gap-3 md:gap-0">
            <h1 className="text-lg md:text-xl font-bold text-gray-800 tracking-tight flex items-center gap-2">
              <div className="w-7 h-7 md:w-8 md:h-8 bg-blue-600 rounded-lg md:rounded-xl flex items-center justify-center text-white">
                <Icon name="description" className="!text-[18px] md:!text-[20px]" />
              </div>
              Contrato Inteligente
            </h1>
            <div className="flex gap-1 md:gap-2 bg-gray-100 p-1 rounded-full w-full md:w-auto justify-center">
              <button onClick={() => navigateTo('#novo-pedido')} className={`flex-1 md:flex-none px-4 py-2 md:px-5 rounded-full text-xs md:text-sm font-medium transition-colors ${currentRoute === '#novo-pedido' ? 'bg-white text-blue-700 shadow-sm' : 'text-gray-600 hover:text-gray-900'}`}>Novo Pedido</button>
              <button onClick={() => navigateTo('#buscar-pedido')} className={`flex-1 md:flex-none px-4 py-2 md:px-5 rounded-full text-xs md:text-sm font-medium transition-colors ${currentRoute === '#buscar-pedido' ? 'bg-white text-blue-700 shadow-sm' : 'text-gray-600 hover:text-gray-900'}`}>Buscar Pedido</button>
            </div>
          </header>
          <main className="p-3 md:p-6 flex-1">
            {/* Passando a senha para os componentes filhos */}
            {currentRoute === '#novo-pedido' ? <NovoPedido appPassword={appPassword} /> : <BuscarPedido appPassword={appPassword} />}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
